openapi: 3.0.3
info:
  title: ELS Feedback & Notification API
  version: 3.0.0
servers:
  - url: https://feedback.els.ericterminal.com
paths:
  /v1/healthz:
    get:
      summary: 健康检查
      responses:
        '200':
          description: ok
  /v1/announcements:
    get:
      summary: 获取已发布的客户端公告
      responses:
        '200':
          description: 公告数组；没有公告时返回空数组
          headers:
            ETag:
              schema:
                type: string
            Cloudflare-CDN-Cache-Control:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicAnnouncement'
        '304':
          description: 公告内容未变化
  /v1/admin/announcements:
    get:
      summary: 获取全部公告管理记录
      servers:
        - url: http://{host}:{port}
          description: 独立管理监听器
          variables:
            host:
              default: 127.0.0.1
            port:
              default: '8081'
      security:
        - announcementAdminToken: []
      responses:
        '200':
          description: 公告管理记录
        '401':
          description: 管理鉴权失败
    post:
      summary: 创建公告
      servers:
        - url: http://{host}:{port}
          description: 独立管理监听器
          variables:
            host:
              default: 127.0.0.1
            port:
              default: '8081'
      security:
        - announcementAdminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnouncementRecordInput'
      responses:
        '201':
          description: 公告已创建
        '400':
          description: 公告字段无效
        '401':
          description: 管理鉴权失败
  /v1/admin/announcements/{key}:
    parameters:
      - in: path
        name: key
        required: true
        schema:
          type: string
    put:
      summary: 更新公告
      servers:
        - url: http://{host}:{port}
          description: 独立管理监听器
          variables:
            host:
              default: 127.0.0.1
            port:
              default: '8081'
      security:
        - announcementAdminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnouncementRecordInput'
      responses:
        '200':
          description: 公告已更新
        '404':
          description: 公告不存在
    delete:
      summary: 删除公告
      servers:
        - url: http://{host}:{port}
          description: 独立管理监听器
          variables:
            host:
              default: 127.0.0.1
            port:
              default: '8081'
      security:
        - announcementAdminToken: []
      responses:
        '204':
          description: 公告已删除
        '404':
          description: 公告不存在
  /v1/distribution/manifest:
    get:
      summary: 获取已发布的官方数据清单
      responses:
        '200':
          description: 官方数据清单
          headers:
            ETag:
              schema:
                type: string
            Cloudflare-CDN-Cache-Control:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicDistributionManifest'
        '304':
          description: 清单内容未变化
  /v1/distribution/files/{checksum}/{file_name}:
    parameters:
      - in: path
        name: checksum
        required: true
        schema:
          type: string
          pattern: '^[a-f0-9]{64}$'
      - in: path
        name: file_name
        required: true
        schema:
          type: string
    get:
      summary: 下载内容寻址的官方文件
      responses:
        '200':
          description: 官方文件内容，响应可长期不可变缓存
        '404':
          description: 文件不存在或已停用
  /v1/admin/distribution:
    get:
      summary: 获取全部官方数据管理记录
      servers:
        - url: http://{host}:{port}
          description: 独立管理监听器
          variables:
            host:
              default: 127.0.0.1
            port:
              default: '8081'
      security:
        - announcementAdminToken: []
      responses:
        '200':
          description: 官方数据管理记录
        '401':
          description: 管理鉴权失败
    post:
      summary: 上传官方数据
      servers:
        - url: http://{host}:{port}
          description: 独立管理监听器
          variables:
            host:
              default: 127.0.0.1
            port:
              default: '8081'
      security:
        - announcementAdminToken: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DistributionUpload'
      responses:
        '201':
          description: 官方数据已创建
        '400':
          description: 表单或文件无效
  /v1/admin/distribution/{key}:
    parameters:
      - in: path
        name: key
        required: true
        schema:
          type: string
    put:
      summary: 更新官方数据
      servers:
        - url: http://{host}:{port}
          description: 独立管理监听器
          variables:
            host:
              default: 127.0.0.1
            port:
              default: '8081'
      security:
        - announcementAdminToken: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DistributionUpdate'
      responses:
        '200':
          description: 官方数据已更新
        '404':
          description: 官方数据不存在
    delete:
      summary: 删除官方数据
      servers:
        - url: http://{host}:{port}
          description: 独立管理监听器
          variables:
            host:
              default: 127.0.0.1
            port:
              default: '8081'
      security:
        - announcementAdminToken: []
      responses:
        '204':
          description: 官方数据已删除
        '404':
          description: 官方数据不存在
  /v1/feedback/challenge:
    post:
      summary: 获取 challenge
      responses:
        '200':
          description: challenge 已生成
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  challenge_id:
                    type: string
                  client_secret:
                    type: string
                  nonce:
                    type: string
                  pow_bits:
                    type: integer
                  pow_salt:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
  /v1/feedback/issues:
    post:
      summary: 创建反馈工单
      parameters:
        - in: header
          name: X-ELS-Challenge-Id
          required: true
          schema:
            type: string
        - in: header
          name: X-ELS-Timestamp
          required: true
          schema:
            type: string
        - in: header
          name: X-ELS-Signature
          required: true
          schema:
            type: string
        - in: header
          name: X-ELS-PoW-Nonce
          required: true
          schema:
            type: string
        - in: header
          name: X-ELS-PoW-Hash
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  issue_number:
                    type: integer
                  ticket_token:
                    type: string
                  public_url:
                    type: string
                    format: uri
                  status:
                    type: string
        '202':
          description: 已受理但内容被暂时隐藏
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  issue_number:
                    type: integer
                  ticket_token:
                    type: string
                  public_url:
                    type: string
                    format: uri
                  status:
                    type: string
                    enum: [blocked]
                  moderation_blocked:
                    type: boolean
                  moderation_message:
                    type: string
                  archive_id:
                    type: string
        '401':
          description: 签名或 challenge 校验失败
        '429':
          description: 触发限流
  /v1/feedback/issues/{issue_number}:
    get:
      summary: 查询反馈工单状态
      parameters:
        - in: path
          name: issue_number
          required: true
          schema:
            type: integer
        - in: query
          name: ticket_token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 查询成功
        '403':
          description: ticket_token 无效
  /v1/feedback/issues/{issue_number}/comments:
    post:
      summary: 在反馈工单下发送评论
      parameters:
        - in: path
          name: issue_number
          required: true
          schema:
            type: integer
        - in: query
          name: ticket_token
          required: true
          schema:
            type: string
        - in: header
          name: X-ELS-Challenge-Id
          required: true
          schema:
            type: string
        - in: header
          name: X-ELS-Timestamp
          required: true
          schema:
            type: string
        - in: header
          name: X-ELS-Signature
          required: true
          schema:
            type: string
        - in: header
          name: X-ELS-PoW-Nonce
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
      responses:
        '200':
          description: 评论已发布
        '202':
          description: 评论被暂时隐藏，已发布占位评论
        '403':
          description: ticket_token 无效
components:
  securitySchemes:
    announcementAdminToken:
      type: http
      scheme: bearer
      description: 使用 ANNOUNCEMENT_ADMIN_TOKEN；浏览器管理台使用安全会话 Cookie
  schemas:
    PublicAnnouncement:
      type: object
      required: [id, type, title, body]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [info, warning, blocking]
        min_build:
          type: string
        max_build:
          type: string
        language:
          type: string
        platform:
          type: string
          enum: [iOS, watchOS]
        title:
          type: string
        body:
          type: string
    AnnouncementRecordInput:
      allOf:
        - $ref: '#/components/schemas/PublicAnnouncement'
        - type: object
          required: [enabled]
          properties:
            enabled:
              type: boolean
    PublicDistributionManifest:
      type: object
      required: [version, downloads]
      properties:
        version:
          type: integer
          enum: [1]
        downloads:
          type: array
          items:
            $ref: '#/components/schemas/PublicDistributionEntry'
    PublicDistributionEntry:
      type: object
      required: [name, path, url, file_name, sha256, size]
      properties:
        name:
          type: string
        path:
          type: string
          example: /Documents/Providers
        url:
          type: string
          example: /v1/distribution/files/0123456789abcdef/provider.json
        file_name:
          type: string
        sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
        size:
          type: integer
          format: int64
          minimum: 1
    DistributionUpload:
      type: object
      required: [name, destination_path, enabled, file]
      properties:
        name:
          type: string
        destination_path:
          type: string
          example: /Documents/Providers
        enabled:
          type: boolean
        file:
          type: string
          format: binary
    DistributionUpdate:
      type: object
      required: [name, destination_path, enabled]
      properties:
        name:
          type: string
        destination_path:
          type: string
          example: /Documents/Providers
        enabled:
          type: boolean
        file:
          type: string
          format: binary
