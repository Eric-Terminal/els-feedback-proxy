<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>ELS 通知中心</title>
    <link rel="stylesheet" href="/admin/assets/admin.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card" aria-labelledby="login-title">
        <div class="app-mark" aria-hidden="true">ELS</div>
        <p class="eyebrow">ETOS LLM Studio</p>
        <h1 id="login-title">通知中心</h1>
        <p class="login-description">登录后可创建、编辑和发布客户端公告。</p>

        {{if .LoginFailed}}
        <p class="form-message form-message-error" role="alert">管理口令不正确，请重新输入。</p>
        {{end}}

        <form class="login-form" method="post" action="/admin/login">
          <label for="password">管理口令</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            autofocus
            required
          />
          <button class="button button-primary button-full" type="submit">登录</button>
        </form>
        <p class="login-note">页面与公告接口均由 feedback.els.ericterminal.com 提供。</p>
      </section>
    </main>
  </body>
</html>
