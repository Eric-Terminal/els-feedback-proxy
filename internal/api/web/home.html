<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>ELS 管理中心</title>
    <link rel="stylesheet" href="/admin/assets/admin.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="app-mark app-mark-small" aria-hidden="true">ELS</div>
        <div>
          <p class="eyebrow">ETOS LLM Studio</p>
          <h1>管理中心</h1>
        </div>
      </div>
      <div class="topbar-actions">
        <nav class="admin-nav" aria-label="管理页面">
          <a class="admin-nav-link is-active" href="/" aria-current="page">概览</a>
          <a class="admin-nav-link" href="/admin/announcements">公告</a>
          <a class="admin-nav-link" href="/admin/surveys">意见征集</a>
          <a class="admin-nav-link" href="/admin/distribution">官方数据</a>
        </nav>
        <span class="service-status"><span class="status-dot"></span>服务已连接</span>
        {{if .ShowLogout}}
        <form method="post" action="/admin/logout">
          <button class="button button-secondary" type="submit">退出</button>
        </form>
        {{end}}
      </div>
    </header>

    <main class="page-shell home-shell">
      <header class="overview-header">
        <div>
          <h2>概览</h2>
          <p>选择要管理的内容。</p>
        </div>
      </header>

      <div class="overview-layout">
        <section aria-labelledby="modules-title">
          <div class="overview-section-heading">
            <h3 id="modules-title">管理项目</h3>
          </div>
          <div class="overview-module-list panel">
            <a class="overview-module" href="/admin/announcements">
              <span class="overview-module-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9Z"></path>
                  <path d="M10 21h4"></path>
                </svg>
              </span>
              <span class="overview-module-copy">
                <strong>公告</strong>
                <span>编辑通知内容、语言版本和发布范围</span>
              </span>
              <span class="overview-chevron" aria-hidden="true">›</span>
            </a>

            <a class="overview-module" href="/admin/surveys">
              <span class="overview-module-icon overview-module-icon-survey" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M5 4h14v16H5z"></path>
                  <path d="M8 8h8"></path>
                  <path d="M8 12h5"></path>
                  <path d="m8 16 1.5 1.5L12 15"></path>
                </svg>
              </span>
              <span class="overview-module-copy">
                <strong>意见征集</strong>
                <span>发布单选、多选问题并查看匿名统计</span>
              </span>
              <span class="overview-chevron" aria-hidden="true">›</span>
            </a>

            <a class="overview-module" href="/admin/distribution">
              <span class="overview-module-icon overview-module-icon-data" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M12 3v12"></path>
                  <path d="m7 10 5 5 5-5"></path>
                  <path d="M5 21h14"></path>
                </svg>
              </span>
              <span class="overview-module-copy">
                <strong>官方数据</strong>
                <span>上传文件并配置客户端下发目录</span>
              </span>
              <span class="overview-chevron" aria-hidden="true">›</span>
            </a>
          </div>
        </section>

        <aside class="overview-service panel" aria-labelledby="service-title">
          <div class="overview-service-heading">
            <h3 id="service-title">服务信息</h3>
            <span><span class="status-dot"></span>已连接</span>
          </div>
          <dl class="overview-details">
            <div>
              <dt>运行版本</dt>
              <dd><code>{{.Version}}</code></dd>
            </div>
            <div>
              <dt>构建提交</dt>
              <dd><code title="{{.Commit}}">{{.Commit}}</code></dd>
            </div>
            <div>
              <dt>页面访问</dt>
              <dd>{{if .WebAuthDisabled}}内网免登录{{else}}口令会话{{end}}</dd>
            </div>
          </dl>
        </aside>
      </div>
    </main>
  </body>
</html>
